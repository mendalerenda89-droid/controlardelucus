<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GESTOR MAESTRO INTERACTIVO - Arde Lucus 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Init EmailJS dentro del módulo
        window.emailjs.init('zhF8LyefG3UTj5dXs');

        const firebaseConfig = {
            apiKey: "AIzaSyDmpGzOSToV8mFRkxSxLKL6Isoi_7lEU2E",
            authDomain: "escape-room-arde-lucus.firebaseapp.com",
            projectId: "escape-room-arde-lucus",
            storageBucket: "escape-room-arde-lucus.firebasestorage.app",
            messagingSenderId: "264728827438",
            appId: "1:264728827438:web:a764eebccf4dcfc73771bf",
            measurementId: "G-YS737T6K14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const reservasRef = collection(db, "reservas");

        window.selectedTime = null;
        window.selectedRama = null;
        window.reservasGlobales = [];

        window.getHorariosCompletos = () => {
            const h = [];
            for(let i=10; i<=13; i++) {
                for(let m=0; m<60; m+=15) {
                    if(i===13 && m>0) break;
                    h.push(`${i.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`);
                }
            }
            const tardes = ["16:30","16:45","17:00","17:15","17:30","17:45","18:00","18:15","18:30"];
            return [...h, ...tardes];
        };

        // Determina la rama según el índice del slot (alternado)
        window.getRamaByIndex = (index) => index % 2 === 0 ? 'Romana' : 'Castrexa';

        window.abrirReservaManual = (time, rama) => {
            window.selectedTime = time;
            window.selectedRama = rama;
            const ramaIcon = rama === 'Romana' ? '🦅' : '🌿';
            const ramaColor = rama === 'Romana' ? '#ffaaaa' : '#aaffaa';
            document.getElementById('manualBookingForm').style.display = 'block';
            document.getElementById('infoReserva').innerHTML = 
                `Nueva Reserva: ${time}h &nbsp;<span style="font-size:0.85rem; padding:3px 10px; border-radius:10px; background:rgba(255,255,255,0.1); color:${ramaColor}">${ramaIcon} ${rama}</span>`;
            document.getElementById('ramaDisplay').textContent = `${ramaIcon} ${rama}`;
            document.getElementById('ramaDisplay').className = `rama-display ${rama === 'Romana' ? 'romana' : 'castrexa'}`;
            document.getElementById('mName').focus();
        };

        window.cerrarForm = () => {
            document.getElementById('manualBookingForm').style.display = 'none';
            document.getElementById('fReserva').reset();
        };

        window.confirmarReservaManual = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('mName').value,
                email: document.getElementById('mEmail').value,
                phone: document.getElementById('mPhone').value,
                size: document.getElementById('mSize').value,
                date: document.getElementById('dateSelect').value,
                time: window.selectedTime,
                rama: window.selectedRama,
                tipo: "Manual (Gestor)"
            };
            try {
                await addDoc(reservasRef, data);
                window.cerrarForm();
            } catch (err) { alert("Error al guardar: " + err); }
        };

        window.removeRes = async (id) => {
            if(confirm("¿Eliminar esta reserva?")) await deleteDoc(doc(db, "reservas", id));
        };

        window.renderAll = () => {
            const container = document.getElementById('slotsGrid');
            const date = document.getElementById('dateSelect').value;
            container.innerHTML = '';
            const horarios = window.getHorariosCompletos();

            horarios.forEach((time, index) => {
                const ramaEsperada = window.getRamaByIndex(index);
                const res = window.reservasGlobales.find(r => r.date === date && r.time === time);
                const div = document.createElement('div');

                // Si hay reserva, usamos su rama; si no, la asignada por índice
                const ramaActual = res?.rama || ramaEsperada;
                const ramaIcon = ramaActual === 'Romana' ? '🦅' : '🌿';
                const ramaClass = ramaActual === 'Romana' ? 'romana' : 'castrexa';

                div.className = `slot ${ramaClass} ${res ? 'booked' : 'free'}`;
                div.innerHTML = `
                    <div class="slot-time">${time}</div>
                    <div class="slot-name">${res ? res.name : 'LIBRE'}</div>
                    <div class="slot-rama">${ramaIcon} ${ramaActual}</div>
                `;

                if (!res) div.onclick = () => window.abrirReservaManual(time, ramaEsperada);
                container.appendChild(div);
            });

            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            window.reservasGlobales.forEach(r => {
                const ramaIcon = r.rama === 'Romana' ? '🦅' : r.rama === 'Castrexa' ? '🌿' : '';
                const ramaClass = r.rama === 'Romana' ? 'romana' : 'castrexa';
                const item = document.createElement('div');
                item.className = 'res-item';
                item.innerHTML = `
                    <div>
                        <b>${r.date} | ${r.time}h</b> — ${r.name} (${r.size}p)
                        ${r.rama ? `<span class="rama-badge ${ramaClass}">${ramaIcon} ${r.rama}</span>` : ''}
                        <br><small>${r.email} | ${r.phone}</small>
                    </div>
                    <button onclick="removeRes('${r.id}')" class="btn-del">Eliminar</button>
                `;
                listDiv.appendChild(item);
            });
        };

        // ——— IDs conocidos para detectar reservas NUEVAS ———
        const idsConocidos = new Set();
        let primerasCarga = true;

        function enviarEmailReserva(r) {
            const fechaLabel = {
                '2026-06-15': 'Lunes 15 de Junio',
                '2026-06-16': 'Martes 16 de Junio',
                '2026-06-17': 'Miércoles 17 de Junio'
            }[r.date] || r.date;

            window.emailjs.send('service_52ib43o', 'template_vxh1yyk', {
                nombre:        r.name        || '—',
                fecha:         fechaLabel    || '—',
                hora:          r.time        || '—',
                rama:          r.rama        || '—',
                participantes: r.size        || '—',
                email:         r.email       || '—',
                telefono:      r.phone       || '—',
                tipo:          r.tipo        || '—'
            }).then(() => {
                console.log('Email enviado para:', r.name);
            }).catch(err => {
                console.error('Error EmailJS:', err);
            });
        }

        onSnapshot(reservasRef, (snapshot) => {
            window.reservasGlobales = snapshot.docs
                .map(doc => ({ id: doc.id, ...doc.data() }))
                .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

            if (primerasCarga) {
                // Primera carga: registrar todos los IDs existentes sin enviar email
                snapshot.docs.forEach(d => idsConocidos.add(d.id));
                primerasCarga = false;
            } else {
                // Cargas siguientes: detectar IDs nuevos y enviar email
                snapshot.docs.forEach(d => {
                    if (!idsConocidos.has(d.id)) {
                        idsConocidos.add(d.id);
                        enviarEmailReserva({ id: d.id, ...d.data() });
                    }
                });
            }

            window.renderAll();
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            --gold: #D4AF37;
            --gold-dim: rgba(212,175,55,0.15);
            --red: #8B0000;
            --red-bright: #c0392b;
            --green-dark: #1a4a1a;
            --green-bright: #2d8a2d;
            --bg: #0d0d0d;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background: var(--bg);
            color: #ddd;
            padding: 20px;
            min-height: 100vh;
        }

        /* Textura sutil de fondo */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            border: 1px solid #333;
            border-top: 3px solid var(--gold);
            padding: 30px;
            border-radius: 4px;
            position: relative;
            background: var(--surface);
            z-index: 1;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            font-size: 1.6rem;
            letter-spacing: 0.12em;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        /* Leyenda de ramas */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
        }
        .legend-dot {
            width: 14px; height: 14px;
            border-radius: 3px;
        }
        .legend-dot.romana  { background: var(--red-bright); border: 1px solid #ff6b6b; }
        .legend-dot.castrexa{ background: var(--green-bright); border: 1px solid #6bff6b; }

        /* Selector de fecha */
        .date-wrapper {
            text-align: center;
            margin: 0 0 25px;
        }
        select {
            padding: 10px 20px;
            background: #000;
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

        /* GRID DE SLOTS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin: 0 0 30px;
        }

        .slot {
            padding: 10px 6px;
            text-align: center;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* Rama Romana - libre */
        .slot.romana.free {
            background: rgba(139,0,0,0.12);
            border-color: rgba(139,0,0,0.4);
            cursor: pointer;
        }
        .slot.romana.free:hover {
            background: rgba(139,0,0,0.25);
            border-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(139,0,0,0.3);
        }

        /* Rama Castrexa - libre */
        .slot.castrexa.free {
            background: rgba(34,100,34,0.12);
            border-color: rgba(34,100,34,0.4);
            cursor: pointer;
        }
        .slot.castrexa.free:hover {
            background: rgba(34,100,34,0.25);
            border-color: var(--green-bright);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(34,140,34,0.3);
        }

        /* Reservados */
        .slot.romana.booked {
            background: rgba(139,0,0,0.4);
            border-color: #c0392b;
            cursor: not-allowed;
        }
        .slot.castrexa.booked {
            background: rgba(34,100,34,0.4);
            border-color: var(--green-bright);
            cursor: not-allowed;
        }

        .slot-time {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #eee;
        }
        .slot-name {
            font-size: 0.72rem;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .slot-rama {
            font-size: 0.65rem;
            color: #888;
            font-style: italic;
        }
        .slot.booked .slot-name { color: white; font-weight: 600; }
        .slot.romana.booked .slot-rama { color: #ffaaaa; }
        .slot.castrexa.booked .slot-rama { color: #aaffaa; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid #333;
            border-top: 3px solid var(--gold);
            padding: 28px;
            border-radius: 6px;
            z-index: 200;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            width: 340px;
        }
        .modal h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0 0 18px;
            font-size: 1rem;
            letter-spacing: 0.06em;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 10px 12px;
            margin: 6px 0;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
        }
        .modal input:focus { outline: none; border-color: var(--gold); }

        .rama-display {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px;
            margin: 6px 0 12px;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.06em;
        }
        .rama-display.romana  { background: rgba(139,0,0,0.3); color: #ffaaaa; border: 1px solid var(--red); }
        .rama-display.castrexa{ background: rgba(34,100,34,0.3); color: #aaffaa; border: 1px solid var(--green-bright); }

        .btn-add {
            background: var(--gold);
            color: #000;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 0.08em;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn-add:hover { background: #f0c842; }

        .btn-cancel {
            background: transparent;
            color: #555;
            border: none;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 6px;
        }
        .btn-cancel:hover { color: #999; }

        /* LISTA */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .list-header h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1rem;
            letter-spacing: 0.1em;
            margin: 0;
        }

        .res-item {
            background: var(--surface2);
            padding: 14px 16px;
            margin: 8px 0;
            border-left: 4px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
        }
        .res-item b { font-family: 'Cinzel', serif; font-size: 0.85rem; }
        .res-item small { color: #666; }

        .rama-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
            font-family: 'Cinzel', serif;
        }
        .rama-badge.romana   { background: rgba(139,0,0,0.35); color: #ffaaaa; border: 1px solid var(--red); }
        .rama-badge.castrexa { background: rgba(34,100,34,0.35); color: #aaffaa; border: 1px solid var(--green-bright); }

        .btn-del {
            background: rgba(139,0,0,0.5);
            color: #ffaaaa;
            border: 1px solid var(--red);
            padding: 7px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .btn-del:hover { background: var(--red); color: white; }

        .btn-export {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 7px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: background 0.2s, color 0.2s;
        }
        .btn-export:hover { background: var(--gold); color: #000; }

        .select-recordatorio {
            background: transparent;
            color: #aaa;
            border: 1px solid #444;
            padding: 7px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            transition: border-color 0.2s;
        }
        .select-recordatorio:focus { outline: none; border-color: var(--gold); color: #ddd; }
        .select-recordatorio option { background: #111; }

        .btn-recordatorio {
            background: transparent;
            color: #aaffaa;
            border: 1px solid var(--green-bright);
            padding: 7px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: background 0.2s, color 0.2s;
        }
        .btn-recordatorio:hover { background: var(--green-bright); color: #000; }

        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
        }
        #manualBookingForm[style*="block"] ~ .overlay,
        .overlay.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GESTOR MAESTRO INTERACTIVO</h1>
        <p class="subtitle">Arde Lucus 2026 — Escape Room</p>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot romana"></div>
                <span>🦅 Romana (pares)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot castrexa"></div>
                <span>🌿 Castrexa (impares)</span>
            </div>
        </div>

        <div class="date-wrapper">
            <select id="dateSelect" onchange="window.renderAll()">
                <option value="2026-06-15">Lunes 15 de Junio</option>
                <option value="2026-06-16">Martes 16 de Junio</option>
                <option value="2026-06-17">Miércoles 17 de Junio</option>
            </select>
        </div>

        <div id="slotsGrid" class="grid"></div>

        <!-- Overlay para cerrar modal al hacer clic fuera -->
        <div class="overlay" id="overlay" onclick="window.cerrarForm()"></div>

        <div id="manualBookingForm" class="modal">
            <h3 id="infoReserva"></h3>
            <span id="ramaDisplay" class="rama-display"></span>
            <form id="fReserva" onsubmit="window.confirmarReservaManual(event)">
                <input type="text"   id="mName"  placeholder="Nombre del Grupo" required>
                <input type="email"  id="mEmail" placeholder="Email" required>
                <input type="tel"    id="mPhone" placeholder="Teléfono" required>
                <input type="number" id="mSize"  value="4" min="1" max="6" placeholder="Participantes">
                <button type="submit" class="btn-add">GUARDAR RESERVA</button>
                <button type="button" onclick="window.cerrarForm()" class="btn-cancel">Cancelar</button>
            </form>
        </div>

        <div class="list-header">
            <h2>INSCRIPCIONES ACTUALES</h2>
            <div style="display:flex; gap:10px; align-items:center;">
                <select id="selectRecordatorio" class="select-recordatorio">
                    <option value="2026-06-15">📅 Recordatorio Lun 15 Jun</option>
                    <option value="2026-06-16">📅 Recordatorio Mar 16 Jun</option>
                    <option value="2026-06-17">📅 Recordatorio Mié 17 Jun</option>
                </select>
                <button class="btn-recordatorio" onclick="window.enviarRecordatorios()">📜 Enviar Recordatorios</button>
                <button class="btn-export" onclick="window.exportarReservas()">📊 Exportar Excel</button>
            </div>
        </div>
        <div id="list"></div>
    </div>

    <script>
        // Overlay
        const origAbrir = window.abrirReservaManual;
        window.abrirReservaManual = function(time, rama) {
            origAbrir(time, rama);
            document.getElementById('overlay').style.display = 'block';
        };
        const origCerrar = window.cerrarForm;
        window.cerrarForm = function() {
            origCerrar();
            document.getElementById('overlay').style.display = 'none';
        };

        // Enviar recordatorios
        window.enviarRecordatorios = async () => {
            const fecha = document.getElementById('selectRecordatorio').value;
            const fechaLabel = {
                '2026-06-15': 'Lunes 15 de Junio',
                '2026-06-16': 'Martes 16 de Junio',
                '2026-06-17': 'Miércoles 17 de Junio'
            }[fecha] || fecha;

            const reservasDelDia = window.reservasGlobales.filter(r => r.date === fecha);

            if (reservasDelDia.length === 0) {
                alert(`No hay reservas para el ${fechaLabel}.`);
                return;
            }

            const confirmar = confirm(
                `¿Enviar recordatorio a ${reservasDelDia.length} grupo${reservasDelDia.length > 1 ? 's' : ''} del ${fechaLabel}?\n\n` +
                reservasDelDia.map(r => `· ${r.name} — ${r.time}h (${r.email})`).join('\n')
            );
            if (!confirmar) return;

            let enviados = 0;
            let errores = 0;

            for (const r of reservasDelDia) {
                if (!r.email) { errores++; continue; }
                try {
                    await window.emailjs.send('service_52ib43o', 'template_aexgm0b', {
                        nombre:             r.name          || '—',
                        fecha:              fechaLabel      || '—',
                        hora:               r.time          || '—',
                        rama:               r.rama          || '—',
                        participantes:      r.size          || '—',
                        email_participante: r.email
                    });
                    enviados++;
                } catch (err) {
                    console.error('Error enviando a', r.email, err);
                    errores++;
                }
            }

            alert(
                `✅ Recordatorios enviados: ${enviados}` +
                (errores > 0 ? `\n⚠️ Errores: ${errores}` : '')
            );
        };
        window.exportarReservas = () => {
            const reservas = window.reservasGlobales;
            if (!reservas || reservas.length === 0) {
                alert('No hay reservas para exportar.');
                return;
            }
            const cols = ['Fecha', 'Hora', 'Nombre', 'Rama', 'Participantes', 'Email', 'Teléfono', 'Tipo'];
            let csv = '\uFEFF' + cols.join(';') + '\r\n';
            reservas.forEach(r => {
                const fila = [
                    r.date  || '', r.time  || '', r.name  || '',
                    r.rama  || '', r.size  || '', r.email || '',
                    r.phone || '', r.tipo  || ''
                ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(';');
                csv += fila + '\r\n';
            });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            a.download = `reservas_arde_lucus_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        };
    </script>
</body>
</html>
